trading:
  max_position_pct: 0.2       # 1銘柄への最大投資割合 20%
  max_sector_pct: 0.30        # 1セクターへの最大投資割合 30%
  min_confidence: 0.6          # 最低確信度
  max_daily_trades: 5          # 1日の最大取引回数
  stop_loss_pct: 0.05          # 損切りライン 5%
  take_profit_pct: 0.15        # 利確ライン 15%

schedule:
  frequency: daily
  time: "16:00"  # 東証終了後

claude:
  model: sonnet  # claude CLIで使うモデル
  max_tokens: 4096
  temperature: 0.3

learning:
  review_interval_days: 7      # 週次レビュー
  lookback_trades: 50          # 学習に使う直近トレード数
  min_trades_for_learning: 10  # 学習開始に必要な最低トレード数

costs:
  commission_rate: 0.0          # 売買手数料率（SBI・楽天ゼロコミッション）
  commission_min: 0             # 最低手数料
  slippage_rate: 0.0005         # スリッページ 0.05%（大型株）
  tax_rate: 0.20315             # 譲渡益課税 20.315%
  enable_tax: true              # 税金計算を有効にする
  enable_slippage: true         # スリッページを有効にする
